services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudcollab-postgres
    environment:
      POSTGRES_DB: cloudcollab
      POSTGRES_USER: cloudcollab
      POSTGRES_PASSWORD: cloudcollab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cloudcollab-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
